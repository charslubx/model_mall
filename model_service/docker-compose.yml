version: '3.8'

services:
  model-service:
    build: .
    container_name: model-service
    ports:
      - "5000:5000"
    volumes:
      # 挂载模型文件目录
      - ./models:/app/models
      # 开发时可以挂载代码目录实现热重载
      # - ./app:/app/app
    environment:
      # 模型文件配置
      - MODEL_PATH=/app/models/checkpoint_best.pth  # ⚠️ 修改为你的checkpoint文件名
      - MODEL_NAME=image-classifier
      
      # ⚠️ 关键配置：对于checkpoint格式（只包含权重）必须指定以下两项
      - MODEL_ARCH=resnet18     # 模型架构（resnet18, efficientnet, mobilenet, simple_cnn, custom_cnn等）
      - NUM_CLASSES=10          # 分类类别数量（必须与训练时一致！）
      
      # 服务配置
      - PORT=5000
      - HOST=0.0.0.0
      - DEVICE=cuda             # 使用GPU（cuda）或CPU（cpu），留空则自动检测
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - model-network

networks:
  model-network:
    driver: bridge
