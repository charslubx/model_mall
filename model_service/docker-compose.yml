version: '3.8'

services:
  model-service:
    build: .
    container_name: model-service
    ports:
      - "5000:5000"
    volumes:
      # 挂载模型文件目录
      - ./models:/app/models
      # 开发时可以挂载代码目录实现热重载
      # - ./app:/app/app
    environment:
      # 模型配置
      - MODEL_PATH=/app/models/model.pth  # 完整模型文件路径
      - MODEL_NAME=image-classifier
      
      # 服务配置
      - PORT=5000
      - HOST=0.0.0.0
      - DEVICE=cuda             # 使用GPU（cuda）或CPU（cpu），留空则自动检测
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - model-network

networks:
  model-network:
    driver: bridge
