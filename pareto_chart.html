<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARLH682 Lead Time Pareto With Exclusion Slicer</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        #chart {
            width: 100%;
            height: 600px;
            background-color: white;
        }
    </style>
</head>
<body>
    <div id="chart"></div>
    
    <script>
        // 初始化图表
        var chartDom = document.getElementById('chart');
        var myChart = echarts.init(chartDom);
        
        // 配置项
        var option = {
            title: {
                text: 'ARLH682 Lead Time Pareto With Exclusion Slicer',
                left: 'center',
                top: 10,
                textStyle: {
                    fontSize: 16,
                    fontWeight: 'bold',
                    color: '#333'
                }
            },
            grid: {
                left: '8%',
                right: '5%',
                bottom: '15%',
                top: '15%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                data: [
                    'IF_ATM_\nDowntime',
                    'True',
                    'IPCI-2H',
                    'IF_12M-BOU_\nC_R',
                    'IF_ATM_\nLockout',
                    'IF_ATM_\nMainten',
                    'TP230L-\nRemove_U'
                ],
                axisLabel: {
                    rotate: 25,
                    interval: 0,
                    fontSize: 10,
                    color: '#666',
                    lineHeight: 14
                },
                axisLine: {
                    lineStyle: {
                        color: '#ccc'
                    }
                },
                axisTick: {
                    show: false
                }
            },
            yAxis: {
                type: 'value',
                name: 'Lead Time',
                nameLocation: 'middle',
                nameGap: 50,
                nameTextStyle: {
                    fontSize: 12,
                    color: '#666'
                },
                min: 0,
                max: 40,
                interval: 10,
                axisLabel: {
                    fontSize: 11,
                    color: '#666'
                },
                axisLine: {
                    show: true,
                    lineStyle: {
                        color: '#ccc'
                    }
                },
                splitLine: {
                    lineStyle: {
                        color: '#e5e5e5',
                        type: 'solid'
                    }
                }
            },
            series: [
                {
                    name: 'Lead Time',
                    type: 'bar',
                    data: [
                        {value: 36.1, itemStyle: {color: '#d65e5e'}},
                        {value: 36.1, itemStyle: {color: '#d65e5e'}},
                        {value: 36.1, itemStyle: {color: '#d6565e'}},
                        {value: 27.1, itemStyle: {color: '#d65e5e'}},
                        {value: 25.0, itemStyle: {color: '#d65e5e'}},
                        {value: 11.7, itemStyle: {color: '#d65e5e'}},
                        {value: 9.0, itemStyle: {color: '#d65e5e'}}
                    ],
                    barWidth: '60%',
                    label: {
                        show: true,
                        position: 'top',
                        fontSize: 12,
                        color: '#333',
                        fontWeight: 'normal',
                        formatter: '{c}'
                    },
                    itemStyle: {
                        borderRadius: 0
                    },
                    // 添加标记线（蓝色虚线）
                    markLine: {
                        silent: true,
                        symbol: 'none',
                        data: [
                            {
                                yAxis: 18,
                                lineStyle: {
                                    type: 'dashed',
                                    color: '#72b4dd',
                                    width: 2
                                },
                                label: {
                                    show: false
                                }
                            }
                        ]
                    }
                }
            ],
            // 添加文本标注（左侧的17）
            graphic: [
                {
                    type: 'text',
                    left: '2%',
                    top: '42%',
                    style: {
                        text: '17',
                        fontSize: 14,
                        fontWeight: 'bold',
                        fill: '#6ba7d6'
                    }
                }
            ]
        };
        
        // 应用配置
        myChart.setOption(option);
        
        // 响应式
        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
</body>
</html>
