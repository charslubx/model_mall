<div class="page">
  <div class="header">
    <h1 nz-typography>🤝 IFA DAP BE YIELD&PCS Sustaining Cool</h1>
    <p nz-typography nzType="secondary">Recording every support, appreciating every help</p>
  </div>

  <nz-card nzTitle="Express Your Gratitude" class="mb-16">
    <form nz-form [formGroup]="form" (ngSubmit)="submit()">
      <div nz-row [nzGutter]="16">
        <div nz-col [nzSpan]="24" [nzMd]="12">
          <nz-form-item>
            <nz-form-label nzFor="sender" nzRequired>From (Sender)</nz-form-label>
            <nz-form-control nzErrorTip="请选择发送人">
              <nz-select
                id="sender"
                formControlName="sender"
                nzPlaceHolder="Select your name"
                nzShowSearch
              >
                <nz-option *ngFor="let user of users" [nzValue]="user" [nzLabel]="user" />
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>

        <div nz-col [nzSpan]="24" [nzMd]="12">
          <nz-form-item>
            <nz-form-label nzFor="receiver" nzRequired>To (Receiver)</nz-form-label>
            <nz-form-control nzErrorTip="请选择接收人">
              <nz-select
                id="receiver"
                formControlName="receiver"
                nzPlaceHolder="Select colleague's name"
                nzShowSearch
              >
                <nz-option *ngFor="let user of users" [nzValue]="user" [nzLabel]="user" />
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <nz-form-item>
        <nz-form-label nzFor="reason" nzRequired>Reason</nz-form-label>
        <nz-form-control nzErrorTip="请填写原因">
          <textarea
            nz-input
            id="reason"
            rows="3"
            formControlName="reason"
            placeholder="E.g., Helped debug the production line data issue..."
          ></textarea>
          <div class="hint" *ngIf="form.controls.reason.value as v">{{ v.length }}/500</div>
        </nz-form-control>
      </nz-form-item>

      <div class="actions">
        <button nz-button nzType="primary" [disabled]="form.invalid || submitting">Submit</button>
      </div>
    </form>
  </nz-card>

  <nz-card *ngIf="chartLabels.length" nzTitle="🏆 Gratitude Leaderboard" class="mb-16">
    <canvas #gratitudeChart height="100"></canvas>
  </nz-card>

  <h3 nz-typography class="section-title">Recent Messages</h3>

  <ng-container *ngIf="messages.length; else emptyState">
    <nz-card class="message-card" *ngFor="let msg of messages; trackBy: trackByMessage">
      <div class="msg-title">
        <strong>{{ msg.sender }}</strong> thanked <strong>{{ msg.receiver }}</strong>
      </div>
      <div class="msg-reason">{{ msg.reason }}</div>
      <div class="timestamp">Time: {{ msg.timestamp }}</div>
    </nz-card>
  </ng-container>

  <ng-template #emptyState>
    <nz-empty nzNotFoundContent="No records yet. Be the first to express gratitude!"></nz-empty>
  </ng-template>
</div>
